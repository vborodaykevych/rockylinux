name: Build and Push Rocky Linux Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Daily builds at midnight UTC

permissions:
  contents: read

concurrency:
  group: rockylinux-images
  cancel-in-progress: false

jobs:
  versions:
    name: Detect Rocky Linux minor versions
    runs-on: ubuntu-latest
    outputs:
      minor9: ${{ steps.detect.outputs.minor9 }}
      minor10: ${{ steps.detect.outputs.minor10 }}
    steps:
      - name: Detect current minor versions
        id: detect
        run: |
          set -euo pipefail

          # library/rockylinux:9 is no longer updated (frozen at 9.3), but the builds
          # run dnf update; update rocky-release first so VERSION_ID matches the
          # content of the built images.
          MINOR_VERSION_9="$(docker run --rm rockylinux:9 sh -c 'dnf -y -q update rocky-release >/dev/null && . /etc/os-release && printf "%s" "$VERSION_ID"')"
          MINOR_VERSION_10="$(docker run --rm rockylinux/rockylinux:10 sh -c '. /etc/os-release; printf "%s" "$VERSION_ID"')"

          echo "minor9=${MINOR_VERSION_9}" >> "$GITHUB_OUTPUT"
          echo "minor10=${MINOR_VERSION_10}" >> "$GITHUB_OUTPUT"

          echo "Rocky Linux 9 minor version: ${MINOR_VERSION_9}"
          echo "Rocky Linux 10 minor version: ${MINOR_VERSION_10}"

  build:
    name: Build ${{ matrix.version }} / ${{ matrix.platform }} / ${{ matrix.variant }} / ${{ matrix.security }}
    needs: versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - 9
          - 10
        platform:
          - amd64
          - arm64
          - ppc64le
          - s390x
        variant:
          - base
          - minimal
        security:
          - root
          - nonroot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set build variables
        run: |
          set -euo pipefail

          VERSION_PREFIX=""
          if [[ "${{ matrix.version }}" != "10" ]]; then
            VERSION_PREFIX="${{ matrix.version }}-"
          fi

          if [[ "${{ matrix.variant }}" == "base" && "${{ matrix.security }}" == "root" ]]; then
            TAG_SUFFIX="${VERSION_PREFIX}${{ matrix.platform }}"
          else
            TAG_SUFFIX="${VERSION_PREFIX}${{ matrix.platform }}${{ matrix.variant == 'minimal' && '-minimal' || '' }}${{ matrix.security == 'nonroot' && '-nonroot' || '' }}"
          fi

          DOCKERFILE="Dockerfile.${{ matrix.variant }}${{ matrix.security == 'nonroot' && '.nonroot' || '' }}"

          if [[ "${{ matrix.version }}" == "9" ]]; then
            BASE_IMAGE="rockylinux"
          else
            BASE_IMAGE="rockylinux/rockylinux"
          fi

          IMAGE_TAG="${{ secrets.DOCKER_USERNAME }}/rockylinux:${TAG_SUFFIX}"
          CACHE_SCOPE="rockylinux-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.variant }}-${{ matrix.security }}"

          echo "TAG_SUFFIX=${TAG_SUFFIX}" >> "$GITHUB_ENV"
          echo "DOCKERFILE=${DOCKERFILE}" >> "$GITHUB_ENV"
          echo "BASE_IMAGE=${BASE_IMAGE}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "CACHE_SCOPE=${CACHE_SCOPE}" >> "$GITHUB_ENV"

          echo "Using Dockerfile: ${DOCKERFILE}"
          echo "Using base image: ${BASE_IMAGE}:${{ matrix.version }}"
          echo "Publishing arch tag: ${IMAGE_TAG}"

      - name: Build and push architecture image
        run: |
          set -euo pipefail

          docker buildx build \
            --platform "linux/${{ matrix.platform }}" \
            --file "$DOCKERFILE" \
            --build-arg "VERSION=${{ matrix.version }}" \
            --build-arg "IMAGE=$BASE_IMAGE" \
            --tag "$IMAGE_TAG" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ matrix.version }}" \
            --provenance=true \
            --sbom=true \
            --cache-from "type=gha,scope=${CACHE_SCOPE}" \
            --cache-to "type=gha,mode=max,scope=${CACHE_SCOPE}" \
            --push \
            .

      - name: Inspect pushed architecture image
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$IMAGE_TAG"

      - name: Smoke test amd64 image
        if: ${{ matrix.platform == 'amd64' }}
        run: |
          set -euo pipefail
          docker run --rm "$IMAGE_TAG" /bin/bash -lc 'id && . /etc/os-release && echo "$PRETTY_NAME"'

  create_manifest:
    name: Create multiarch manifests
    needs:
      - versions
      - build
    runs-on: ubuntu-latest
    env:
      REPO: ${{ secrets.DOCKER_USERNAME }}/rockylinux
      MINOR_VERSION_9: ${{ needs.versions.outputs.minor9 }}
      MINOR_VERSION_10: ${{ needs.versions.outputs.minor10 }}

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and verify manifests
        run: |
          set -euo pipefail

          create_manifest() {
            local tag="$1"
            shift

            for attempt in 1 2 3 4 5; do
              echo "Creating manifest ${REPO}:${tag} (attempt ${attempt})..."

              if docker buildx imagetools create --tag "${REPO}:${tag}" "$@"; then
                docker buildx imagetools inspect "${REPO}:${tag}"
                return 0
              fi

              echo "Manifest creation failed for ${REPO}:${tag}; retrying in 30 seconds..."
              sleep 30
            done

            echo "Failed to create manifest ${REPO}:${tag}"
            return 1
          }

          # Rocky Linux 10 base manifests.
          for tag in "latest" "10" "${MINOR_VERSION_10}"; do
            create_manifest "$tag" \
              "${REPO}:amd64" \
              "${REPO}:arm64" \
              "${REPO}:ppc64le" \
              "${REPO}:s390x"
          done

          # Rocky Linux 10 minimal manifests.
          for tag in "latest-minimal" "10-minimal" "${MINOR_VERSION_10}-minimal"; do
            create_manifest "$tag" \
              "${REPO}:amd64-minimal" \
              "${REPO}:arm64-minimal" \
              "${REPO}:ppc64le-minimal" \
              "${REPO}:s390x-minimal"
          done

          # Rocky Linux 10 nonroot manifests.
          for tag in "nonroot" "10-nonroot" "${MINOR_VERSION_10}-nonroot"; do
            create_manifest "$tag" \
              "${REPO}:amd64-nonroot" \
              "${REPO}:arm64-nonroot" \
              "${REPO}:ppc64le-nonroot" \
              "${REPO}:s390x-nonroot"
          done

          # Rocky Linux 10 minimal nonroot manifests.
          for tag in "nonroot-minimal" "10-minimal-nonroot" "${MINOR_VERSION_10}-minimal-nonroot"; do
            create_manifest "$tag" \
              "${REPO}:amd64-minimal-nonroot" \
              "${REPO}:arm64-minimal-nonroot" \
              "${REPO}:ppc64le-minimal-nonroot" \
              "${REPO}:s390x-minimal-nonroot"
          done

          # Rocky Linux 9 base manifests.
          for tag in "9" "${MINOR_VERSION_9}"; do
            create_manifest "$tag" \
              "${REPO}:9-amd64" \
              "${REPO}:9-arm64" \
              "${REPO}:9-ppc64le" \
              "${REPO}:9-s390x"
          done

          # Rocky Linux 9 minimal manifests.
          for tag in "9-minimal" "${MINOR_VERSION_9}-minimal"; do
            create_manifest "$tag" \
              "${REPO}:9-amd64-minimal" \
              "${REPO}:9-arm64-minimal" \
              "${REPO}:9-ppc64le-minimal" \
              "${REPO}:9-s390x-minimal"
          done

          # Rocky Linux 9 nonroot manifests.
          for tag in "9-nonroot" "${MINOR_VERSION_9}-nonroot"; do
            create_manifest "$tag" \
              "${REPO}:9-amd64-nonroot" \
              "${REPO}:9-arm64-nonroot" \
              "${REPO}:9-ppc64le-nonroot" \
              "${REPO}:9-s390x-nonroot"
          done

          # Rocky Linux 9 minimal nonroot manifests.
          for tag in "9-minimal-nonroot" "${MINOR_VERSION_9}-minimal-nonroot"; do
            create_manifest "$tag" \
              "${REPO}:9-amd64-minimal-nonroot" \
              "${REPO}:9-arm64-minimal-nonroot" \
              "${REPO}:9-ppc64le-minimal-nonroot" \
              "${REPO}:9-s390x-minimal-nonroot"
          done
